<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lorecast</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header class="app-header">
    <div class="brand" onclick="go('home')">
      <img src="assets/lorecast-logo.png" alt="Lorecast" class="brand-logo" />
    </div>

    <nav class="main-nav">
      <a onclick="go('catalogo')" data-i18n="navStories">Storie</a>
      <a onclick="goCreateStory()">Crea storia</a>
    </nav>

    <div class="header-actions">
  <select id="languageSwitcher" class="language-switcher">
    <option value="it">🇮🇹 IT</option>
    <option value="en">🇬🇧 EN</option>
    <option value="es">🇪🇸 ES</option>
    <option value="fr">🇫🇷 FR</option>
  </select>

  <button id="headerLoginButton" class="login-header-button" onclick="go('login')">
    Accedi
  </button>

  <button id="notificationButton" class="notification-button" onclick="toggleNotificationsDropdown()">
    🔔
    <span id="notificationBadge" class="notification-badge">0</span>
  </button>

  <div id="headerUserChip" class="user-chip" onclick="go('profilo')">
    <div class="user-avatar" id="headerUserAvatar">U</div>
    <div>
      <strong id="headerUserName">Utente</strong>
      <span id="headerUserRole">Player</span>
    </div>
  </div>
</div>
  </header>

  <div id="notificationsDropdown" class="notifications-popover">
    <div class="notifications-popover-header">
      <strong>Notifiche</strong>
      <button class="light" onclick="toggleNotificationsDropdown()">×</button>
    </div>

    <div id="notificationsPreview"></div>

    <button class="light" onclick="go('notifiche'); toggleNotificationsDropdown();">
      Vedi tutte
    </button>
  </div>

  <main id="app" class="app-shell"></main>

  <footer>
    <strong>Lorecast</strong> — Marketplace professionale per Master e giocatori.
  </footer>

  <script src="js/translations.js"></script>
  <script src="js/data.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>

  <script src="js/app.js"></script>
</body>
</html>
