<section id="catalogo" class="page">
  <h1 data-i18n="catalogTitle">Catalogo storie</h1>
  <p data-i18n="catalogIntro">Filtra le esperienze e clicca una storia per aprire la scheda.</p>

  <div class="layout">
    <aside class="card filters">
      <h2 data-i18n="catalogFilters">Filtri</h2>

      <input id="q" data-i18n-placeholder="catalogSearchPlaceholder" placeholder="Cerca titolo, parola o Master" oninput="renderCatalog()" />
      <p class="filter-hint" data-i18n="catalogSearchHint">Puoi cercare anche il nome del Master.</p>

      <select id="genre" onchange="renderCatalog()">
        <option value="" data-i18n="genreAny">Tutti i generi</option>
        <option value="Fantasy" data-i18n="genreFantasy">Fantasy</option>
        <option value="Horror" data-i18n="genreHorror">Horror</option>
        <option value="Cena con delitto" data-i18n="genreMurderDinner">Cena con delitto</option>
        <option value="Investigativo" data-i18n="genreInvestigative">Investigativo</option>
        <option value="Sci-fi" data-i18n="genreSciFi">Sci-fi</option>
      </select>

      <select id="type" onchange="renderCatalog()">
        <option value="" data-i18n="typeAny">Tutti i tipi</option>
        <option value="Con Master" data-i18n="typeWithMaster">Con Master</option>
        <option value="Self-play" data-i18n="typeSelfPlay">Self-play</option>
      </select>


      <select id="experienceFormatFilter" onchange="renderCatalog()">
        <option value="" data-i18n="experienceFormatAny">Tutti i formati</option>
        <option value="one_shot_gdr" data-i18n="experienceFormatOneShotGdr">One-shot GDR</option>
        <option value="campagna_gdr" data-i18n="experienceFormatCampaignGdr">Campagna GDR</option>
      </select>

      <select id="price" onchange="renderCatalog()">
        <option value="" data-i18n="priceAny">Qualsiasi prezzo</option>
        <option value="free" data-i18n="priceFree">Gratis</option>
        <option value="10" data-i18n="priceUpTo10">Fino a 10€</option>
        <option value="20" data-i18n="priceUpTo20">Fino a 20€</option>
        <option value="30" data-i18n="priceUpTo30">Fino a 30€</option>
      </select>

      <select id="storyLanguageFilter" onchange="renderCatalog()">
        <option value="" data-i18n="storyLanguageAny">Tutte le lingue</option>
        <option value="it" data-i18n="storyLanguageItalian">Italiano</option>
        <option value="en" data-i18n="storyLanguageEnglish">English</option>
        <option value="es" data-i18n="storyLanguageSpanish">Español</option>
        <option value="fr" data-i18n="storyLanguageFrench">Français</option>
      </select>

      <button class="light" onclick="resetFilters()" data-i18n="commonReset">Reset</button>
    </aside>

    <div>
      <h2 id="count"></h2>
      <div class="grid" id="stories"></div>
    </div>
  </div>
</section>
